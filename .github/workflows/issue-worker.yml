name: Issue Worker (reusable)

# Reusable workflow: when an issue is opened, an agent implements it and opens a PR. The caller
# owns the trigger (`issues: [opened]`) and stays trivial; ALL policy lives here.
#
# Trust gate (engine-agnostic, defined once for every caller): the `gate` job verifies the issue
# author has write permission on the repo before any agent step runs. This is the pipeline's
# primary security control — the worker only ever acts on issues from trusted authors. It lives
# here, not in the vendor action, so it survives an engine swap. Do not widen it to CONTRIBUTOR:
# "ever had a commit merged" is not "has access".
#
# The agent does the work directly: full shell to build/test, then it commits, pushes a branch,
# and opens the PR with `gh` authed by BOT_PAT. The PAT matters because default-GITHUB_TOKEN
# events never trigger other workflows — the PR must trigger the review workflow.
#
# Security envelope (see the design doc): BOT_PAT is scoped to THIS repo only. Combined with the
# author gate and branch protection on the default branch, a worst-case injected run can open a
# PR (needs your merge) or comment — bounded and recoverable, on public and private repos alike.

on:
  workflow_call:
    inputs:
      engine:
        description: Agent engine to run (currently only 'claude'; 'codex' reserved).
        type: string
        required: false
        default: claude
      model:
        description: Model for the claude engine.
        type: string
        required: false
        default: claude-opus-4-8
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
      BOT_PAT:
        required: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      allowed: ${{ steps.check.outputs.allowed }}
    steps:
      - name: Check issue author has write access
        id: check
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
          AUTHOR: ${{ github.event.issue.user.login }}
        run: |
          perm=$(gh api "repos/${{ github.repository }}/collaborators/${AUTHOR}/permission" --jq .permission 2>/dev/null || echo "none")
          echo "issue author: ${AUTHOR}, permission: ${perm}"
          if [ "$perm" = "admin" ] || [ "$perm" = "maintain" ] || [ "$perm" = "write" ]; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
          else
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Issue author '${AUTHOR}' lacks write access — worker will not run."
          fi

  work:
    needs: gate
    if: needs.gate.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Validate engine
        if: inputs.engine != 'claude'
        run: |
          echo "::error::engine '${{ inputs.engine }}' is not wired up yet (supported: claude)"
          exit 1

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Run issue worker (claude)
        id: agent
        if: inputs.engine == 'claude'
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.BOT_PAT }}
          track_progress: true
          prompt: |
            You are the autonomous issue worker for ${{ github.repository }}. Resolve issue
            #${{ github.event.issue.number }} (its title and body are in the context above) end to
            end.

            Steps:
            1. Understand the issue from the context above.
            2. Implement the change, with tests where appropriate. You have full shell access for
               builds and test runs.
            3. Run the repo's test suite if one exists and make it pass.
            4. Commit your changes (you are on a dedicated branch) and push:
               `git push -u origin HEAD`.
            5. Open a PR whose body ends with `Fixes #${{ github.event.issue.number }}`:
               `gh pr create --title "<concise title>" --body "<summary>

               Fixes #${{ github.event.issue.number }}"`

            If the issue is not actionable as written, do NOT open a PR — instead explain why with
            `gh issue comment ${{ github.event.issue.number }} --body "<explanation>"`.

            Stay strictly within the scope of the issue.
          claude_args: |
            --model ${{ inputs.model }}
            --max-turns 100
            --allowedTools "Bash"

      # Reliability guard (independent of the trust model): fail the job if the agent errored, so
      # a bad run can't show a green check.
      - name: Fail if the agent errored
        if: inputs.engine == 'claude' && steps.agent.outputs.execution_file != ''
        run: |
          f="${{ steps.agent.outputs.execution_file }}"
          # Check ONLY the final result object's is_error (the `.type == "result"` element). A
          # plain `.is_error` errors on the top-level array (silent no-op), and scanning every
          # object false-positives on benign mid-run tool errors.
          if jq -e '[.. | objects | select(.type == "result")] | last | .is_error == true' "$f" > /dev/null; then
            echo "::error::Agent finished with is_error=true (see execution log above)"
            jq '[.. | objects | select(has("num_turns"))] | last | {num_turns, permission_denials_count, total_cost_usd}' "$f" || true
            exit 1
          fi

      # Nothing fails silently: any failure above lands back on the issue with the run link.
      - name: Report failure on the issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --repo "$GITHUB_REPOSITORY" \
            --body "⚠️ The issue worker failed on this issue. See the run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
