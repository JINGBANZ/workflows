name: Issue Worker (reusable)

# Reusable workflow: when an issue is opened, an agent implements it and a PR is opened. The
# caller owns the trigger (`issues: [opened]`) and stays trivial; ALL policy lives here.
#
# Trust gate (engine-agnostic, defined once for every caller): the `gate` job verifies the issue
# author has write permission on the repo before any agent step runs. This must live here — the
# claude engine happens to ship its own built-in write-access check, but a swapped-in engine may
# not, and the trust model must not depend on the vendor. Do not widen the gate to CONTRIBUTOR:
# "ever had a commit merged" is not "has access".
#
# Split-privilege design (the "safe outputs" pattern):
#   - The AGENT gets full shell access (it must run arbitrary builds/tests) but NO GitHub
#     credential in its shell env — it implements the issue, commits locally, and writes a PR
#     draft file. Issue content reaches it via track_progress context injection (sanitized by
#     the action), not raw interpolation.
#   - Deterministic steps then verify real commits exist, push the branch, and open the PR with
#     BOT_PAT. The PAT matters: default-GITHUB_TOKEN events never trigger workflows, so the PR
#     would not start the review workflow without it.
#   - On any failure, a final step comments on the issue with the run link — nothing is silent.

on:
  workflow_call:
    inputs:
      engine:
        description: Agent engine to run (currently only 'claude'; 'codex' reserved).
        type: string
        required: false
        default: claude
      model:
        description: Model for the claude engine.
        type: string
        required: false
        default: claude-opus-4-8
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
      BOT_PAT:
        required: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      allowed: ${{ steps.check.outputs.allowed }}
    steps:
      - name: Check issue author has write access
        id: check
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
          AUTHOR: ${{ github.event.issue.user.login }}
        run: |
          perm=$(gh api "repos/${{ github.repository }}/collaborators/${AUTHOR}/permission" --jq .permission 2>/dev/null || echo "none")
          echo "issue author: ${AUTHOR}, permission: ${perm}"
          if [ "$perm" = "admin" ] || [ "$perm" = "maintain" ] || [ "$perm" = "write" ]; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
          else
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Issue author '${AUTHOR}' lacks write access — worker will not run."
          fi

  work:
    needs: gate
    if: needs.gate.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Validate engine
        if: inputs.engine != 'claude'
        run: |
          echo "::error::engine '${{ inputs.engine }}' is not wired up yet (supported: claude)"
          exit 1

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Record pre-agent baseline
        id: base
        run: |
          mkdir -p "$RUNNER_TEMP/agent"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Run issue worker (claude)
        id: agent
        if: inputs.engine == 'claude'
        uses: anthropics/claude-code-action@v1
        env:
          CLAUDE_CODE_SUBPROCESS_ENV_SCRUB: '1'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.BOT_PAT }}
          track_progress: true
          prompt: |
            You are the autonomous issue worker for ${{ github.repository }}, resolving issue
            #${{ github.event.issue.number }} (its title and body are in the context above).
            You have NO GitHub credentials in your shell: `gh` will not work and you must not
            push — later pipeline steps publish your work.

            Steps:
            1. Understand the issue from the context above.
            2. Implement the requested change, with tests where appropriate. You have full shell
               access for builds and test runs.
            3. Run the repo's test suite if one exists and make it pass.
            4. Commit all your changes locally with git (you are already on a dedicated branch).
            5. Write ${{ runner.temp }}/agent/pr.md in exactly this format:
               - line 1: `TITLE: <concise PR title>`
               - remaining lines: the PR description — what changed, why, and how it was tested.

            If the issue is not actionable as written, make no code changes and write
            ${{ runner.temp }}/agent/pr.md with `NO_CHANGES` as line 1, followed by a short
            explanation — it will be posted on the issue as a comment.

            Stay strictly within the scope of the issue.
          claude_args: |
            --model ${{ inputs.model }}
            --max-turns 100
            --allowedTools "Bash"

      # Deterministic publisher: verifies the agent's work product, pushes, opens the PR. The
      # only steps holding a write credential. Fails loudly on agent error, missing draft, or a
      # draft that claims work without commits.
      - name: Verify work and open PR
        if: inputs.engine == 'claude'
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          BASELINE: ${{ steps.base.outputs.sha }}
        run: |
          exec_file="${{ steps.agent.outputs.execution_file }}"
          if [ -n "$exec_file" ] && jq -e '.is_error == true' "$exec_file" > /dev/null; then
            echo "::error::Agent finished with is_error=true (see execution log above)"
            jq '{num_turns, permission_denials_count, total_cost_usd}' "$exec_file" || true
            exit 1
          fi

          draft="$RUNNER_TEMP/agent/pr.md"
          if [ ! -s "$draft" ]; then
            echo "::error::Agent produced no PR draft"
            exit 1
          fi
          first=$(head -n 1 "$draft")

          if [ "$first" = "NO_CHANGES" ]; then
            comment="$RUNNER_TEMP/agent/comment.md"
            {
              echo "The issue worker reviewed this issue and did not open a PR:"
              echo
              tail -n +2 "$draft"
            } > "$comment"
            gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file "$comment"
            echo "::notice::Not actionable — explanation posted on issue #${ISSUE_NUMBER}."
            exit 0
          fi

          case "$first" in
            "TITLE: "*) title=${first#TITLE: } ;;
            *) echo "::error::Draft malformed: first line must be 'TITLE: ...' or 'NO_CHANGES'"; exit 1 ;;
          esac

          # Safety net: commit anything the agent left uncommitted.
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions"
            git config user.email "github-actions@users.noreply.github.com"
            git add -A
            git commit -m "chore: commit remaining agent changes"
          fi

          if [ "$(git rev-parse HEAD)" = "$BASELINE" ]; then
            echo "::error::Agent drafted a PR but made no commits"
            exit 1
          fi

          branch=$(git branch --show-current)
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:refs/heads/${branch}"

          body="$RUNNER_TEMP/agent/pr-body.md"
          tail -n +2 "$draft" > "$body"
          printf '\n\nFixes #%s\n' "$ISSUE_NUMBER" >> "$body"
          url=$(gh pr create --repo "$GITHUB_REPOSITORY" --head "$branch" --title "$title" --body-file "$body")
          echo "::notice::Opened ${url}"

      # Nothing is allowed to fail silently: any failure above lands back on the issue.
      - name: Report failure on the issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --repo "$GITHUB_REPOSITORY" \
            --body "⚠️ The issue worker failed on this issue. See the run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
