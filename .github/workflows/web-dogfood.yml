name: Web Dogfood Auditor (reusable)

# Reusable workflow: a scheduled agent opens the caller's live website in a real browser
# (agent-browser CLI), runs the `dogfood` exploratory-testing skill to hunt for bugs and UX
# problems, ALSO proposes UX/feature changes aimed at growth, then files ONE detailed GitHub
# issue with the full report. Screenshots render INLINE in the report: a second job uploads the
# evidence as a GitHub Release, and the agent embeds each screenshot with `![](asset-url)`. Release
# asset URLs are github.com-origin, so GitHub serves them with the viewer's own session (not via
# the Camo proxy, which can't see private repos) — meaning they render inline for anyone who can
# view the repo, with no evidence branch and no third-party image host. Repro videos ride along as
# asset links (Releases don't get an inline player). A full copy is also uploaded as a run artifact.
#
# The agent does the work directly: it drives Chromium via `agent-browser`, loads the skill from
# the CLI (`agent-browser skills get dogfood`), dedups against existing issues with `gh`, and
# files the report. Unlike the opener/worker, this uses the default GITHUB_TOKEN, not BOT_PAT —
# the report is terminal (a human reads it), so it deliberately must NOT trigger any downstream
# workflow, which is exactly what GITHUB_TOKEN-created issues can't do. No extra secret to set up.
#
# Security envelope: the AGENT job only READS a website and WRITES a text issue (its token is
# scoped contents: read, issues: write) — it never pushes or opens PRs, so a prompt-injecting page
# can at worst produce one text issue. The evidence UPLOAD job needs contents: write to create the
# Release, but runs NO agent (a deterministic script, zero injection surface). --max-turns and the
# is_error guard are the reliability controls. `max_open_reports` is backpressure so reports don't
# pile up.
#
# Engine-agnostic surface: callers pass `engine` (default: claude); the agent step is selected
# here, so switching engines later is a hub-side change that never touches callers.

on:
  workflow_call:
    inputs:
      url:
        description: The website URL to explore and test (e.g. https://example.com).
        type: string
        required: true
      engine:
        description: Agent engine to run (currently only 'claude'; 'codex' reserved).
        type: string
        required: false
        default: claude
      model:
        description: Model for the claude engine.
        type: string
        required: false
        default: claude-opus-4-8
      max_open_reports:
        description: Skip the run while this many agent-filed dogfood reports are still open.
        type: number
        required: false
        default: 2
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false

jobs:
  dogfood:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      proceed: ${{ steps.cap.outputs.proceed }}
    permissions:
      contents: read
      issues: write
    steps:
      - name: Validate engine
        if: inputs.engine != 'claude'
        run: |
          echo "::error::engine '${{ inputs.engine }}' is not wired up yet (supported: claude)"
          exit 1

      - name: Validate URL
        run: |
          case "${{ inputs.url }}" in
            http://*|https://*) echo "target: ${{ inputs.url }}" ;;
            *) echo "::error::url must start with http:// or https:// (got '${{ inputs.url }}')"; exit 1 ;;
          esac

      # Repo checkout is read-only context so the agent can ground its feature proposals in the
      # actual product/roadmap, not just the live site. It never writes here.
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      # Backpressure: skip the (expensive) browser run if several dogfood reports are still open.
      # Reports carry a hidden body marker. Read-only, uses the job token.
      - name: Check open dogfood-report cap
        id: cap
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
            --search '"agent: web-dogfood" in:body' --json number --jq 'length')
          echo "open dogfood reports: ${count} (cap: ${{ inputs.max_open_reports }})"
          if [ "$count" -ge "${{ inputs.max_open_reports }}" ]; then
            echo "::notice::Cap reached — skipping this run."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

      # Install the browser-automation CLI + a matching Chromium, using the runner's preinstalled
      # Node (currently 24 — no setup-node needed, which also avoids the Node-20 deprecation). The
      # dogfood skill content is served by the CLI itself (`agent-browser skills get dogfood`), so
      # it never goes stale.
      - name: Install agent-browser
        if: steps.cap.outputs.proceed == 'true'
        run: |
          npm i -g agent-browser
          agent-browser install
          mkdir -p dogfood-output/screenshots dogfood-output/videos
          # WebM recording uses Chromium's built-in encoder, but ensure ffmpeg is present for GIF
          # export / codec fallbacks. Preinstalled on ubuntu-latest; this is cheap insurance.
          command -v ffmpeg >/dev/null || { sudo apt-get update && sudo apt-get install -y ffmpeg; }

      - name: Run web dogfood (claude)
        id: agent
        if: steps.cap.outputs.proceed == 'true' && inputs.engine == 'claude'
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          prompt: |
            You are the autonomous web-quality auditor for ${{ github.repository }}. Explore the
            live website ${{ inputs.url }} in a real browser, find bugs and UX problems, propose
            growth-oriented improvements, and file ONE detailed GitHub issue with the full report.

            Load the tooling and skill first (these serve version-matched instructions — follow
            them exactly):
              agent-browser skills get core --full
              agent-browser skills get dogfood
            Use the `agent-browser` binary directly (not `npx`). Chromium is already installed.
            Write all evidence under ./dogfood-output/ (screenshots/ and videos/ already exist).

            EVIDENCE (embed screenshots INLINE): after you finish, every file you save under
            ./dogfood-output/ is uploaded as a GitHub Release asset, served from this base URL:
              ${{ github.server_url }}/${{ github.repository }}/releases/download/dogfood-${{ github.run_id }}
            Release assets are a FLAT namespace keyed by FILENAME (basename only — no folders in the
            URL). So a file saved as `./dogfood-output/screenshots/issue-1-step-2.png` is served at
            `<BASE>/issue-1-step-2.png`. Requirements:
              - Give every screenshot/video a UNIQUE, lowercase kebab-case basename using only
                [a-z0-9.-] (e.g. `issue-1-step-2.png`) so the URL is predictable and unambiguous.
              - EMBED each screenshot INLINE in the report with image syntax:
                `![short caption](<BASE>/issue-1-step-2.png)` — this renders the image on the issue
                page. Do NOT use a plain link for screenshots, and never `![](relative/path)`.
              - For repro videos, use a LINK (Releases have no inline player):
                `[🎥 repro video](<BASE>/issue-1-repro.webm)`.

            Do this in order:
            1. DEDUP FIRST. Run `gh issue list --state open --limit 100` and
               `gh issue list --state closed --limit 30`, and read any prior dogfood reports
               (`gh issue list --state all --search '"agent: web-dogfood" in:body' --limit 10`).
               Note every bug/issue already reported. Do NOT re-report anything already tracked.
            2. EXPLORE & TEST. Follow the dogfood skill against ${{ inputs.url }}: navigate like a
               real user through the main sections, exercise interactive elements and realistic
               end-to-end flows, check empty/error/edge states, and watch the browser console.
               Capture repro evidence into ./dogfood-output/ as the skill instructs — full repro
               video + step screenshots for interactive bugs, a single annotated screenshot for
               static ones. Aim for 5-10 well-documented, reproducible findings (skip duplicates
               of already-tracked issues). Verify each issue reproduces before writing it up.
            3. PROPOSE IMPROVEMENTS. While exploring, also think like a growth-minded product
               designer: propose concrete new features or changes that would improve the user
               experience and help attract and retain new users. Ground them in what you actually
               saw (friction points, unclear onboarding, missing affordances). For each proposal
               give: the problem/opportunity, the proposed change, and the expected user/growth
               impact. Ground them in ${{ github.repository }}'s product where the checked-out repo
               makes that possible.
            4. FILE ONE ISSUE. Post a single, well-structured report with `gh issue create`.
               Suggested title: `Web dogfood report — ${{ inputs.url }} (<date>)`. The body must
               contain, in this order:
                 - A short summary with severity counts.
                 - `## Bugs & issues` — each finding with severity, the affected page/URL, numbered
                   repro steps, and expected vs. actual, with its screenshots EMBEDDED inline and
                   its repro video LINKED (see EVIDENCE above).
                 - `## UX & growth proposals` — the improvement ideas from step 3, prioritized.
               The body MUST END with this exact marker line so future runs can find it and dedup:
               `<!-- agent: web-dogfood -->`
               Apply a `dogfood` label if it exists (create it if you can; otherwise omit).

            Never modify repository files, never push, never open PRs. Only read the site, write
            evidence under ./dogfood-output/, and file the one report issue.
          claude_args: |
            --model ${{ inputs.model }}
            --max-turns 120
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep"

      # Full copy of everything the agent captured, as a downloadable bundle. The upload-evidence
      # job also consumes this artifact to publish the files as Release assets.
      - name: Upload dogfood evidence
        if: always() && steps.cap.outputs.proceed == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: dogfood-output
          path: dogfood-output/
          if-no-files-found: ignore
          retention-days: 30

      # Reliability guard (independent of the trust model): the action exits 0 even when the agent
      # errored, so a bad run could look green. Fail the job on is_error.
      - name: Fail if the agent errored
        if: steps.cap.outputs.proceed == 'true' && inputs.engine == 'claude' && steps.agent.outputs.execution_file != ''
        run: |
          f="${{ steps.agent.outputs.execution_file }}"
          # Check ONLY the final result object's is_error (the `.type == "result"` element). A
          # plain `.is_error` errors on the top-level array (silent no-op), and scanning every
          # object false-positives on benign mid-run tool errors.
          if jq -e '[.. | objects | select(.type == "result")] | last | .is_error == true' "$f" > /dev/null; then
            echo "::error::Agent finished with is_error=true (see execution log above)"
            jq '[.. | objects | select(has("num_turns"))] | last | {num_turns, permission_denials_count, total_cost_usd}' "$f" || true
            exit 1
          fi

  # Publish the evidence as a GitHub Release so the report's `![](...)` embeds render INLINE
  # (release asset URLs are github.com-origin — served with the viewer's session, not via Camo — so
  # they display on the issue page even for private repos, with no evidence branch). No agent runs
  # here: a deterministic script with zero prompt-injection surface.
  upload-evidence:
    needs: dogfood
    if: always() && needs.dogfood.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download evidence bundle
        uses: actions/download-artifact@v6
        with:
          name: dogfood-output
          path: dogfood-output

      - name: Publish evidence as a release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="dogfood-${{ github.run_id }}"
          # Release assets are a flat namespace; collect every evidence file by basename. The agent
          # is told to use unique kebab-case basenames, so the served URLs match what it embedded.
          mkdir -p _assets
          find dogfood-output -type f \( -iname '*.png' -o -iname '*.webm' -o -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.gif' \) \
            -exec cp {} _assets/ \;
          if [ -z "$(ls -A _assets 2>/dev/null)" ]; then
            echo "No evidence assets were produced — nothing to publish."; exit 0
          fi
          # Create the prerelease (or, on a re-run, add/replace assets on the existing one).
          gh release create "$tag" _assets/* --repo "$GITHUB_REPOSITORY" --prerelease \
            --title "Dogfood evidence — run ${{ github.run_id }}" \
            --notes "Screenshots/videos for the web-dogfood report from run ${{ github.run_id }}. Auto-generated; safe to delete once the report is resolved." \
            || gh release upload "$tag" _assets/* --repo "$GITHUB_REPOSITORY" --clobber
          echo "Published $(ls -1 _assets | wc -l) assets to release ${tag}"
          # Bound clutter: keep only the 12 most recent dogfood-* prereleases (tag = dogfood-<run_id>,
          # and run IDs are monotonic, so a numeric sort on the second field is chronological).
          gh release list --repo "$GITHUB_REPOSITORY" --limit 200 --json tagName \
            --jq '.[] | .tagName | select(startswith("dogfood-"))' \
            | sort -t- -k2 -n | head -n -12 \
            | while read -r old; do gh release delete "$old" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true; done
