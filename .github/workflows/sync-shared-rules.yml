# Reusable workflow: sync the shared engineering rules from JINGBANZ/rules into the calling repo.
#
# Fetches shared-rules.md from the source repo and splices it between the marker lines of the
# target file in the CALLING repo, then opens a PR there if anything changed. The begin marker is
# any line starting with `<!-- shared-rules:begin` (free text may follow inside the comment); the
# end marker is a line that is exactly `<!-- shared-rules:end -->`. Runs entirely on the calling
# repo's GITHUB_TOKEN —
# no PAT. The calling repo must enable
# Settings → Actions → General → "Allow GitHub Actions to create and approve pull requests".
name: Sync shared rules
on:
  workflow_call:
    inputs:
      source-repo:
        description: "owner/repo to fetch shared-rules.md from (must be public)"
        type: string
        default: JINGBANZ/rules
      source-ref:
        description: "branch or tag of the source repo"
        type: string
        default: main
      target-file:
        description: "file in the calling repo containing the shared-rules marker block"
        type: string
        default: AGENTS.md
permissions: {}
jobs:
  sync:
    runs-on: ubuntu-latest
    # Serialize overlapping runs (e.g. manual dispatch during the scheduled run) — they race on
    # the same chore/sync-shared-rules branch and the loser fails its push.
    concurrency:
      group: sync-shared-rules
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Splice shared rules into the marker block
        env:
          SOURCE_REPO: ${{ inputs.source-repo }}
          SOURCE_REF: ${{ inputs.source-ref }}
          TARGET_FILE: ${{ inputs.target-file }}
        run: |
          curl -fsSL --retry 3 --retry-delay 2 \
            "https://raw.githubusercontent.com/${SOURCE_REPO}/${SOURCE_REF}/shared-rules.md" \
            -o "${RUNNER_TEMP}/shared-rules.md"
          python3 - <<'EOF'
          import os, pathlib, sys
          target = pathlib.Path(os.environ["TARGET_FILE"])
          rules = pathlib.Path(os.environ["RUNNER_TEMP"], "shared-rules.md").read_text().strip()
          lines = target.read_text().splitlines(keepends=True)
          # Markers are matched per LINE: begin is a line starting with the prefix (the rest of
          # the comment is free text and preserved), end is a line that is exactly the end string.
          # Exactly one pair may exist — quoted or duplicated markers fail loudly here rather
          # than splicing at the wrong spot.
          BEGIN, END = "<!-- shared-rules:begin", "<!-- shared-rules:end -->"
          begins = [n for n, l in enumerate(lines) if l.startswith(BEGIN)]
          ends = [n for n, l in enumerate(lines) if l.rstrip() == END]
          if len(begins) != 1 or len(ends) != 1 or ends[0] < begins[0]:
              sys.exit(f"{target}: need exactly one shared-rules marker pair (begin before end), "
                       f"found {len(begins)} begin / {len(ends)} end")
          b, e = begins[0], ends[0]
          target.write_text("".join(lines[: b + 1]) + "\n" + rules + "\n\n" + "".join(lines[e:]))
          EOF
      - name: Open a pull request if anything changed
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "chore: sync shared rules from ${{ inputs.source-repo }}"
          title: "chore: sync shared rules"
          body: |
            Automated update of the shared-rules block in `${{ inputs.target-file }}`, synced from
            [`${{ inputs.source-repo }}`](https://github.com/${{ inputs.source-repo }}).
            Review and merge to adopt the latest shared engineering rules.
          branch: chore/sync-shared-rules
          delete-branch: true
