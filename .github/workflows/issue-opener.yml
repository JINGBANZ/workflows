name: Issue Opener (reusable)

# Reusable workflow: a scheduled agent explores the caller's repo and files at most ONE small,
# actionable issue. The caller owns the trigger (schedule/workflow_dispatch) and passes secrets.
#
# The agent does the work directly: it runs `gh` with BOT_PAT to dedup against existing issues
# and file the new one. The PAT matters because default-GITHUB_TOKEN events never trigger other
# workflows — the new issue must trigger the issue-worker.
#
# Security envelope (see the design doc): BOT_PAT is a fine-grained token scoped to THIS repo only
# (issues + pull requests + contents). If it ever leaked via prompt injection the blast radius is
# this repo — a PR still needs your merge, an issue is just text. Keep branch protection on the
# default branch. --max-turns and the is_error guard are the reliability controls.
#
# Engine-agnostic surface: callers pass `engine` (default: claude); the agent step is selected
# here, so switching engines later is a hub-side change that never touches callers.

on:
  workflow_call:
    inputs:
      engine:
        description: Agent engine to run (currently only 'claude'; 'codex' reserved).
        type: string
        required: false
        default: claude
      model:
        description: Model for the claude engine.
        type: string
        required: false
        default: claude-opus-4-8
      max_open_issues:
        description: Skip the run while this many agent-filed issues are still open.
        type: number
        required: false
        default: 3
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
      BOT_PAT:
        required: true

jobs:
  open-issue:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
    steps:
      - name: Validate engine
        if: inputs.engine != 'claude'
        run: |
          echo "::error::engine '${{ inputs.engine }}' is not wired up yet (supported: claude)"
          exit 1

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      # Backpressure: skip the (expensive) agent run if the repo already has several unresolved
      # agent-filed issues. Agent issues carry a hidden body marker. Read-only, uses the job token.
      - name: Check open agent-issue cap
        id: cap
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
            --search '"agent: issue-opener" in:body' --json number --jq 'length')
          echo "open agent issues: ${count} (cap: ${{ inputs.max_open_issues }})"
          if [ "$count" -ge "${{ inputs.max_open_issues }}" ]; then
            echo "::notice::Cap reached — skipping this run."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run issue opener (claude)
        id: agent
        if: steps.cap.outputs.proceed == 'true' && inputs.engine == 'claude'
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.BOT_PAT }}
          prompt: |
            You are the autonomous repository auditor for ${{ github.repository }}. File exactly
            ONE new, small, actionable GitHub issue.

            Steps:
            1. Run `gh issue list --state open --limit 100` and
               `gh issue list --state closed --limit 30` to see what already exists. Never file a
               duplicate or near-duplicate.
            2. Explore the codebase (Read/Grep/Glob and any shell commands — linters, tests,
               dependency checks). Look for bugs, missing tests, documentation drift, dead code,
               dependency problems, TODO comments, developer-experience gaps.
            3. Pick the single most valuable finding an autonomous coding agent could complete in
               one sitting: small, well-scoped, verifiable.
            4. File it with `gh issue create`. The body must include context, the specific files
               involved, acceptance criteria, and a suggested approach, and must END with this
               marker line so future runs can find it:
               `<!-- agent: issue-opener -->`

            If nothing genuinely valuable exists, file nothing and say so. Do not force a trivial
            finding. Never modify repository files, never push, never open PRs.
          claude_args: |
            --model ${{ inputs.model }}
            --max-turns 30
            --allowedTools "Bash"

      # Reliability guard (independent of the trust model): the action exits 0 even when the agent
      # errored, so a bad run could look green. Fail the job on is_error.
      - name: Fail if the agent errored
        if: steps.cap.outputs.proceed == 'true' && inputs.engine == 'claude' && steps.agent.outputs.execution_file != ''
        run: |
          f="${{ steps.agent.outputs.execution_file }}"
          # Check ONLY the final result object's is_error (the `.type == "result"` element). A
          # plain `.is_error` errors on the top-level array (silent no-op), and scanning every
          # object false-positives on benign mid-run tool errors.
          if jq -e '[.. | objects | select(.type == "result")] | last | .is_error == true' "$f" > /dev/null; then
            echo "::error::Agent finished with is_error=true (see execution log above)"
            jq '[.. | objects | select(has("num_turns"))] | last | {num_turns, permission_denials_count, total_cost_usd}' "$f" || true
            exit 1
          fi
