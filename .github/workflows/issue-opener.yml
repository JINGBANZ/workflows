name: Issue Opener (reusable)

# Reusable workflow: a scheduled agent explores the caller's repo and drafts at most ONE small,
# actionable issue. The caller owns the trigger (schedule/workflow_dispatch) and passes secrets.
#
# Split-privilege design: the AGENT runs with full shell access but ZERO GitHub write credentials
# (its github_token is the read-only default job token). It only writes a draft file. The actual
# issue is filed by peter-evans/create-issue-from-file using BOT_PAT — a maintained, off-the-shelf
# publisher rather than hand-rolled `gh` plumbing. The PAT matters: default-GITHUB_TOKEN events
# never trigger workflows, so the new issue would not start the issue-worker without it.
#
# Engine-agnostic surface: callers pass `engine` (default: claude); the agent step is selected
# here, so switching engines later is a hub-side change that never touches callers.

on:
  workflow_call:
    inputs:
      engine:
        description: Agent engine to run (currently only 'claude'; 'codex' reserved).
        type: string
        required: false
        default: claude
      model:
        description: Model for the claude engine.
        type: string
        required: false
        default: claude-opus-4-8
      max_open_issues:
        description: Skip the run while this many agent-filed issues are still open.
        type: number
        required: false
        default: 3
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
      BOT_PAT:
        required: true

jobs:
  open-issue:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: read
    steps:
      - name: Validate engine
        if: inputs.engine != 'claude'
        run: |
          echo "::error::engine '${{ inputs.engine }}' is not wired up yet (supported: claude)"
          exit 1

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      # Backpressure: if the repo already has several unresolved agent-filed issues, filing more
      # only piles up noise (and burns an agent run). Agent issues carry a hidden body marker.
      - name: Check open agent-issue cap
        id: cap
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
            --search '"agent: issue-opener" in:body' --json number --jq 'length')
          echo "open agent issues: ${count} (cap: ${{ inputs.max_open_issues }})"
          if [ "$count" -ge "${{ inputs.max_open_issues }}" ]; then
            echo "::notice::Cap reached — skipping this run."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

      # Pre-compute dedup context so the agent never needs GitHub access of its own.
      - name: Collect existing issues for dedup context
        if: steps.cap.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "$RUNNER_TEMP/agent"
          {
            echo "## Open issues"
            gh issue list --repo "$GITHUB_REPOSITORY" --state open --limit 100 \
              --json number,title --jq '.[] | "#\(.number) \(.title)"'
            echo
            echo "## Recently closed issues"
            gh issue list --repo "$GITHUB_REPOSITORY" --state closed --limit 30 \
              --json number,title --jq '.[] | "#\(.number) \(.title)"'
          } > "$RUNNER_TEMP/agent/existing-issues.md"

      - name: Run issue opener (claude)
        id: agent
        if: steps.cap.outputs.proceed == 'true' && inputs.engine == 'claude'
        uses: anthropics/claude-code-action@v1
        env:
          CLAUDE_CODE_SUBPROCESS_ENV_SCRUB: '1'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          prompt: |
            You are the autonomous repository auditor for ${{ github.repository }}. Find the
            single most valuable, small, actionable improvement and write it up as a GitHub issue
            draft. You have NO GitHub write access: do not use `gh` to create anything, do not
            push — a later pipeline step files the issue from your draft.

            Steps:
            1. Read ${{ runner.temp }}/agent/existing-issues.md — every open and recently closed
               issue. Never draft a duplicate or near-duplicate of any of them.
            2. Explore the codebase. Use Read/Grep/Glob and any local shell commands you find
               useful (linters, test runs, dependency checks). Look for: bugs, missing tests,
               documentation drift, dead code, dependency problems, TODO comments,
               developer-experience gaps.
            3. Pick ONE finding that an autonomous coding agent could complete in one sitting:
               small, well-scoped, verifiable.
            4. Write the draft to ${{ runner.temp }}/agent/issue.md in exactly this format:
               - line 1: `TITLE: <concise issue title>`
               - remaining lines: the issue body — context, the specific files involved,
                 acceptance criteria, and a suggested approach.

            If nothing genuinely valuable exists, write exactly `NO_CHANGES` as the only line of
            ${{ runner.temp }}/agent/issue.md and stop. Do not force a trivial finding.

            Never modify repository files; write only under ${{ runner.temp }}/agent/.
          claude_args: |
            --model ${{ inputs.model }}
            --max-turns 30
            --allowedTools "Bash"

      # Verify the agent succeeded and split its draft into title + body for the publisher.
      # This is our own output contract, not GitHub plumbing — the actual create is delegated.
      - name: Verify draft
        id: draft
        if: steps.cap.outputs.proceed == 'true' && inputs.engine == 'claude'
        run: |
          exec_file="${{ steps.agent.outputs.execution_file }}"
          if [ -n "$exec_file" ] && jq -e '.is_error == true' "$exec_file" > /dev/null; then
            echo "::error::Agent finished with is_error=true (see execution log above)"
            jq '{num_turns, permission_denials_count, total_cost_usd}' "$exec_file" || true
            exit 1
          fi

          draft="$RUNNER_TEMP/agent/issue.md"
          if [ ! -s "$draft" ]; then
            echo "::error::Agent produced no issue draft"
            exit 1
          fi
          first=$(head -n 1 "$draft")
          if [ "$first" = "NO_CHANGES" ]; then
            echo "::notice::Agent found nothing worth filing — no issue created."
            echo "create=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          case "$first" in
            "TITLE: "*) title=${first#TITLE: } ;;
            *) echo "::error::Draft malformed: first line must be 'TITLE: ...' or 'NO_CHANGES'"; exit 1 ;;
          esac

          body="$RUNNER_TEMP/agent/issue-body.md"
          tail -n +2 "$draft" > "$body"
          printf '\n\n<!-- agent: issue-opener -->\n' >> "$body"
          echo "create=true" >> "$GITHUB_OUTPUT"
          echo "title=$title" >> "$GITHUB_OUTPUT"

      # Off-the-shelf publisher: files the issue with BOT_PAT so it triggers the issue-worker.
      - name: File issue
        if: steps.draft.outputs.create == 'true'
        uses: peter-evans/create-issue-from-file@v5
        with:
          token: ${{ secrets.BOT_PAT }}
          title: ${{ steps.draft.outputs.title }}
          content-filepath: ${{ runner.temp }}/agent/issue-body.md
