# Caller template — copy to a target repo's .github/workflows/claude.yml
# Calls the reusable workflow in JINGBANZ/workflows. Requires the CLAUDE_CODE_OAUTH_TOKEN secret in
# the target repo (run /install-github-app there — see this repo's README quick start).
name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && github.event.comment.body != '@claude /resolve-conflicts') ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    uses: JINGBANZ/workflows/.github/workflows/claude.yml@main
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    # Optional: run on a self-hosted runner (default: ubuntu-latest)
    # with:
    #   runs-on: vps

  resolve-conflicts:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      github.event.comment.body == '@claude /resolve-conflicts'
    uses: JINGBANZ/workflows/.github/workflows/claude-resolve-conflicts.yml@main
    permissions:
      contents: write
      pull-requests: read
      issues: write
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    with:
      # Optional: run on a self-hosted runner (default: ubuntu-latest).
      # runs-on: vps
      # Replace this with the target repository's required pre-push gate.
      validation-command: npm test
