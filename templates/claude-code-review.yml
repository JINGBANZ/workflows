# Caller template — copy to a target repo's .github/workflows/claude-code-review.yml
# Calls the reusable workflow in JINGBANZ/workflows. Requires the CLAUDE_CODE_OAUTH_TOKEN secret in
# the target repo (run /install-github-app there — see this repo's README quick start).
name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    uses: JINGBANZ/workflows/.github/workflows/claude-code-review.yml@main
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    # Optional: override the driver model, or run on a self-hosted runner (defaults shown)
    # with:
    #   model: claude-sonnet-4-6
    #   runs-on: ubuntu-latest
